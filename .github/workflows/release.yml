name: CI Release

on:
  push:
    branches: [main]

jobs:
  # ── 1. Detect which packages changed ────────────────────────────────────────
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      core:      ${{ steps.filter.outputs.core }}
      runner:    ${{ steps.filter.outputs.runner }}
      cli:       ${{ steps.filter.outputs.cli }}
      hub-nats:  ${{ steps.filter.outputs.hub-nats }}
      hub-redis: ${{ steps.filter.outputs.hub-redis }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'packages/core/**'
            runner:
              - 'packages/runner/**'
            cli:
              - 'packages/cli/**'
            hub-nats:
              - 'packages/hub-nats/**'
            hub-redis:
              - 'packages/hub-redis/**'

  # ── 2. Publish @duckflux/core ───────────────────────────────────────────────
  publish-core:
    name: Publish @duckflux/core
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @duckflux/core (JS only, skip tsc)
        # Build all sub-path entrypoints so that @duckflux/runner can bundle them
        run: >
          bun build
          src/index.ts
          src/parser/index.ts
          src/cel/index.ts
          src/engine/index.ts
          src/eventhub/index.ts
          --outdir dist --target node --format esm
        working-directory: packages/core

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish if version is new
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@duckflux/core@${VERSION}" &>/dev/null; then
            echo "@duckflux/core@${VERSION} already published — skipping"
          else
            npm publish --access public --ignore-scripts
          fi
        working-directory: packages/core

  # ── 3. Publish @duckflux/runner ─────────────────────────────────────────────
  # Runs when core OR runner changes. Waits for publish-core (may be skipped).
  publish-runner:
    name: Publish @duckflux/runner
    needs: [detect-changes, publish-core]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.publish-core.result == 'success' || needs.publish-core.result == 'skipped') &&
      (needs.detect-changes.outputs.core == 'true' || needs.detect-changes.outputs.runner == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @duckflux/core (JS only, needed by runner bundler)
        run: >
          bun build
          src/index.ts
          src/parser/index.ts
          src/cel/index.ts
          src/engine/index.ts
          src/eventhub/index.ts
          --outdir dist --target node --format esm
        working-directory: packages/core

      - name: Build @duckflux/runner (JS only, skip tsc)
        run: |
          bun build src/main.ts --outdir dist --target node --format esm --banner '#!/usr/bin/env node'
          chmod +x dist/main.js
        working-directory: packages/runner

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish if version is new
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@duckflux/runner@${VERSION}" &>/dev/null; then
            echo "@duckflux/runner@${VERSION} already published — skipping"
          else
            npm publish --access public --ignore-scripts
          fi
        working-directory: packages/runner

  # ── 4. Publish duckflux (thin CLI wrapper) ──────────────────────────────────
  # Runs when core OR runner OR cli changes. Waits for publish-runner (may be skipped).
  publish-cli:
    name: Publish duckflux
    needs: [detect-changes, publish-runner]
    if: |
      always() &&
      needs.detect-changes.result == 'success' &&
      (needs.publish-runner.result == 'success' || needs.publish-runner.result == 'skipped') &&
      (
        needs.detect-changes.outputs.core    == 'true' ||
        needs.detect-changes.outputs.runner  == 'true' ||
        needs.detect-changes.outputs.cli     == 'true'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish if version is new
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "duckflux@${VERSION}" &>/dev/null; then
            echo "duckflux@${VERSION} already published — skipping"
          else
            npm publish --access public --ignore-scripts
          fi
        working-directory: packages/cli

  # ── 5. Compile & publish GitHub Release (binaries) ──────────────────────────
  # Runs when core OR runner changes. Creates a release only if the version tag
  # doesn't exist yet — idempotent on repeated commits without version bump.
  release-binaries:
    name: Compile & publish GitHub Release
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.core == 'true' ||
      needs.detect-changes.outputs.runner == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version-check.outputs.version }}
      skip: ${{ steps.version-check.outputs.skip }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check if release already exists for this version
        id: version-check
        run: |
          VERSION=$(node -p "require('./packages/runner/package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Release v${VERSION} already exists — skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile all platform binaries
        if: steps.version-check.outputs.skip == 'false'
        run: bun run compile
        working-directory: packages/runner

      - name: Create GitHub Release and upload binaries
        if: steps.version-check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version-check.outputs.version }}
          name: "quack v${{ steps.version-check.outputs.version }}"
          body: |
            ## quack v${{ steps.version-check.outputs.version }}

            ### Standalone binaries (no Bun/Node required)

            Download the binary for your platform, make it executable and add it to your `PATH`.

            | Platform | File |
            |---|---|
            | Linux x64 | `quack-linux-x64` |
            | Linux ARM64 | `quack-linux-arm64` |
            | macOS x64 | `quack-darwin-x64` |
            | macOS ARM64 | `quack-darwin-arm64` |
            | Windows x64 | `quack-windows-x64.exe` |

            ### via npm / npx

            ```sh
            npx duckflux run workflow.yaml
            bunx duckflux run workflow.yaml
            ```

            Or install globally:
            ```sh
            npm install -g duckflux
            quack run workflow.yaml
            ```

            ### via Homebrew

            ```sh
            brew install duckflux/tap/quack
            ```

            ### via APT (Debian/Ubuntu)

            ```sh
            curl -fsSL https://duckflux.github.io/apt-repo/install.sh | bash
            ```
          files: packages/runner/bin/*
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 6. Publish @duckflux/hub-nats ───────────────────────────────────────────
  # hub-nats uses @duckflux/core as peerDep (not bundled), so it doesn't need
  # to wait for publish-core. Only publishes when hub-nats files themselves change.
  publish-hub-nats:
    name: Publish @duckflux/hub-nats
    needs: detect-changes
    if: needs.detect-changes.outputs['hub-nats'] == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @duckflux/hub-nats (JS only, skip tsc)
        run: bun build src/index.ts --outdir dist --target node --format esm
        working-directory: packages/hub-nats

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish if version is new
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@duckflux/hub-nats@${VERSION}" &>/dev/null; then
            echo "@duckflux/hub-nats@${VERSION} already published — skipping"
          else
            npm publish --access public --ignore-scripts
          fi
        working-directory: packages/hub-nats

  # ── 7. Publish @duckflux/hub-redis ──────────────────────────────────────────
  publish-hub-redis:
    name: Publish @duckflux/hub-redis
    needs: detect-changes
    if: needs.detect-changes.outputs['hub-redis'] == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build @duckflux/hub-redis (JS only, skip tsc)
        run: bun build src/index.ts --outdir dist --target node --format esm
        working-directory: packages/hub-redis

      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish if version is new
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@duckflux/hub-redis@${VERSION}" &>/dev/null; then
            echo "@duckflux/hub-redis@${VERSION} already published — skipping"
          else
            npm publish --access public --ignore-scripts
          fi
        working-directory: packages/hub-redis

  # ── 8. Smoke-test compiled binaries ──────────────────────────────────────────
  # Runs each platform binary in a Docker container to verify it works before
  # publishing to package managers. Gates apt and homebrew publishing.
  smoke-test:
    name: Smoke-test binaries
    needs: release-binaries
    if: needs.release-binaries.outputs.skip == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - binary: quack-linux-x64
            image: ubuntu:22.04
            platform: linux/amd64
          - binary: quack-linux-arm64
            image: ubuntu:22.04
            platform: linux/arm64
    steps:
      - name: Download binary from release
        run: |
          VERSION="${{ needs.release-binaries.outputs.version }}"
          gh release download "v${VERSION}" \
            --repo duckflux/runtime-js \
            --pattern "${{ matrix.binary }}" \
            --dir .
          chmod +x ${{ matrix.binary }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create test workflow
        run: |
          cat > test.duck.yaml << 'YAML'
          flow:
            - type: exec
              as: hello
              run: echo "smoke-test-ok"
          output: hello.output
          YAML

      - name: Set up QEMU (for arm64 emulation)
        if: matrix.platform == 'linux/arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Run smoke tests in Docker
        run: |
          docker run --rm --platform ${{ matrix.platform }} \
            -v "$PWD/${{ matrix.binary }}:/usr/local/bin/quack" \
            -v "$PWD/test.duck.yaml:/work/test.duck.yaml" \
            -w /work \
            ${{ matrix.image }} \
            bash -c '
              set -e
              echo "=== quack version ==="
              quack version

              echo "=== quack lint ==="
              quack lint test.duck.yaml

              echo "=== quack run ==="
              OUTPUT=$(quack run test.duck.yaml)
              echo "$OUTPUT"

              if [ "$OUTPUT" != "smoke-test-ok" ]; then
                echo "FAIL: unexpected output"
                exit 1
              fi

              echo "=== All smoke tests passed ==="
            '

  # ── 9. Publish APT .deb packages ───────────────────────────────────────────
  publish-apt:
    name: Publish APT packages
    needs: [release-binaries, smoke-test]
    if: needs.release-binaries.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Download linux binaries from release
        run: |
          VERSION="${{ needs.release-binaries.outputs.version }}"
          gh release download "v${VERSION}" \
            --pattern "quack-linux-*" \
            --dir packages/runner/bin
          chmod +x packages/runner/bin/quack-linux-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build .deb packages
        run: |
          VERSION="${{ needs.release-binaries.outputs.version }}"
          cd packages/runner

          # amd64
          export VERSION NFPM_ARCH=amd64 BIN_ARCH=x64
          envsubst < nfpm.yaml > nfpm-amd64.yaml
          nfpm package --config nfpm-amd64.yaml --packager deb --target "duckflux_${VERSION}_amd64.deb"

          # arm64
          export NFPM_ARCH=arm64 BIN_ARCH=arm64
          envsubst < nfpm.yaml > nfpm-arm64.yaml
          nfpm package --config nfpm-arm64.yaml --packager deb --target "duckflux_${VERSION}_arm64.deb"

      - name: Clone apt-repo
        run: |
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/duckflux/apt-repo.git" apt-repo

      - name: Update APT repository
        run: |
          VERSION="${{ needs.release-binaries.outputs.version }}"

          # Copy .deb packages
          cp packages/runner/duckflux_${VERSION}_amd64.deb apt-repo/pool/main/
          cp packages/runner/duckflux_${VERSION}_arm64.deb apt-repo/pool/main/

          cd apt-repo

          # Ensure directory structure
          mkdir -p dists/stable/main/binary-amd64
          mkdir -p dists/stable/main/binary-arm64

          # Regenerate package indices
          dpkg-scanpackages --arch amd64 pool/ > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          dpkg-scanpackages --arch arm64 pool/ > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          # Generate Release file
          apt-ftparchive release dists/stable/ > dists/stable/Release

      - name: Import GPG key and sign
        run: |
          cd apt-repo
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --import --batch 2>/dev/null

          # Detached signature
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            -abs -o dists/stable/Release.gpg dists/stable/Release

          # Cleartext signed
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "${{ secrets.GPG_PASSPHRASE }}" \
            --clearsign -o dists/stable/InRelease dists/stable/Release

          # Export public key
          gpg --armor --export > dists/stable/Release.gpg.key

      - name: Push to apt-repo
        run: |
          cd apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "quack v${{ needs.release-binaries.outputs.version }}"
          git push

  # ── 10. Update Homebrew tap ────────────────────────────────────────────────
  publish-homebrew:
    name: Update Homebrew tap
    needs: [release-binaries, smoke-test]
    if: needs.release-binaries.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries and compute checksums
        run: |
          VERSION="${{ needs.release-binaries.outputs.version }}"
          gh release download "v${VERSION}" \
            --repo duckflux/runtime-js \
            --pattern "quack-darwin-*" \
            --pattern "quack-linux-*" \
            --dir binaries
          echo "SHA_DARWIN_ARM64=$(sha256sum binaries/quack-darwin-arm64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_DARWIN_X64=$(sha256sum binaries/quack-darwin-x64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_LINUX_ARM64=$(sha256sum binaries/quack-linux-arm64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_LINUX_X64=$(sha256sum binaries/quack-linux-x64 | cut -d' ' -f1)" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone homebrew-tap
        run: |
          git clone "https://x-access-token:${{ secrets.GH_PAT }}@github.com/duckflux/homebrew-tap.git" homebrew-tap

      - name: Generate formula
        run: |
          VERSION="${{ needs.release-binaries.outputs.version }}"
          cat > homebrew-tap/Formula/quack.rb << FORMULA
          class Quack < Formula
            desc "Declarative YAML-based workflow runner"
            homepage "https://github.com/duckflux/runtime-js"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/duckflux/runtime-js/releases/download/v${VERSION}/quack-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "https://github.com/duckflux/runtime-js/releases/download/v${VERSION}/quack-darwin-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/duckflux/runtime-js/releases/download/v${VERSION}/quack-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "https://github.com/duckflux/runtime-js/releases/download/v${VERSION}/quack-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install Dir["quack-*"].first => "quack"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/quack version")
            end
          end
          FORMULA

      - name: Push formula update
        run: |
          cd homebrew-tap
          git rm -f Formula/runner.rb 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/quack.rb
          git commit -m "quack v${{ needs.release-binaries.outputs.version }}"
          git push
